name: Build 360V6 OpenWrt

on:
  workflow_dispatch:  # 手动触发
  schedule:
    - cron: '0 0 * * 0'  # 每周日 00:00 UTC 自动构建
  push:
    branches: [main]
    paths:
      - '.config'
      - 'config/**'
      - 'scripts/**'
      - '.github/workflows/build.yml'

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    env:
      REPO_URL: https://github.com/immortalwrt/immortalwrt.git
      REPO_BRANCH: openwrt-23.05
      CONFIG_DIR: ${{ github.workspace }}/config
      SCRIPT_DIR: ${{ github.workspace }}/scripts

    steps:
      # 1️⃣ 检出代码
      - name: Checkout Project
        uses: actions/checkout@v4

      # 2️⃣ 系统依赖安装
      - name: Initialize Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git \
            libncurses5-dev libssl-dev python3 python3-pip \
            rsync unzip zlib1g-dev wget file zstd ccache
          # 确保 python3 指向正确版本
          if [ ! -f /usr/bin/python3.10 ]; then
            sudo apt-get install -y python3.10
          fi
          sudo update-alternatives --install /usr/bin/python3 python3 /usr/bin/python3.10 1

      # 3️⃣ 克隆源码（带缓存）
      - name: Clone Source Code
        uses: actions/checkout@v4
        with:
          repository: immortalwrt/immortalwrt
          ref: ${{ env.REPO_BRANCH }}
          path: openwrt
          fetch-depth: 1

      # 4️⃣ 缓存工具链（加速编译）
      - name: Cache OpenWrt Toolchain
        uses: actions/cache@v4
        with:
          path: |
            openwrt/staging_dir
            openwrt/build_dir/target-*
            openwrt/dl
          key: ${{ runner.os }}-toolchain-${{ hashFiles('config/base.config') }}
          restore-keys: |
            ${{ runner.os }}-toolchain-

      # 5️⃣ 缓存 Feeds（避免重复下载）
      - name: Cache OpenWrt Feeds
        uses: actions/cache@v4
        with:
          path: |
            openwrt/feeds
            openwrt/tmp
          key: ${{ runner.os }}-feeds-${{ hashFiles('scripts/feeds-setup.sh') }}
          restore-keys: |
            ${{ runner.os }}-feeds-

      # 6️⃣ 应用编译配置
      - name: Apply Configuration
        run: |
          cd openwrt
          # 复制基础配置（彻底避免 Heredoc 缩进问题）
          cp ${{ env.CONFIG_DIR }}/base.config .config
          
          # 注入动态版本信息
          echo "CONFIG_VERSIONOPT=y" >> .config
          echo "CONFIG_VERSION_FILE_NAME=\"360V6-$(date +%Y%m%d)-${{ github.run_number }}\"" >> .config
          echo "CONFIG_VERSION_REPO=\"${{ github.server_url }}/${{ github.repository }}\"" >> .config

      # 7️⃣ 更新和安装 Feeds
      - name: Update & Install Feeds
        run: |
          cd openwrt
          # 【核心修复】必须同时删除 tmp 目录，才能强制重新下载源码
          # 否则系统会解压 tmp 目录下的旧缓存，导致版本号不变
          rm -rf feeds tmp
          
          # 拷贝并运行配置脚本
          cp ../scripts/feeds-setup.sh ./feeds-setup.sh
          chmod +x feeds-setup.sh
          ./feeds-setup.sh
          
          # 更新源（带重试机制）
          for i in 1 2 3; do
            ./scripts/feeds update -f && break
            echo "第 $i 次更新失败，等待 10 秒后重试..."
            sleep 10
          done
          
          # 安装软件包
          ./scripts/feeds install -a

      # 8️⃣ 生成 HTTPS 代理配置（可选）
      - name: Generate HTTPS Proxy
        if: env.PROXY_URL != ''
        run: |
          # 仅在设置 PROXY_URL 时生效
          cat >> openwrt/.config <<EOF
          CONFIG_GIT_USE_PROXY=y
          CONFIG_GIT_PROXY_HTTP="${{ env.PROXY_URL }}"
          CONFIG_GIT_PROXY_HTTPS="${{ env.PROXY_URL }}"
          EOF

      # 9️⃣ 生成最终配置
      - name: Generate Defconfig
        run: |
          cd openwrt
          make defconfig

      # 🔟 下载源码包（带重试）
      - name: Download Dependencies
        run: |
          cd openwrt
          for i in 1 2 3; do
            make download -j$(nproc) && break || sleep 15
          done

      # 1️⃣1️⃣ 编译固件（并行 + 降级）
      - name: Compile Firmware
        run: |
          cd openwrt
          # 优先并行编译，失败时自动降级单线程 + 详细日志
          make -j$(nproc) || {
            echo "Parallel build failed, retrying with single thread..."
            make -j1 V=sc
          }

      # 1️⃣2️⃣ 整理产物
      - name: Organize Artifacts
        run: |
          cd openwrt
          mkdir -p artifacts
          
          # 复制固件文件
          find bin/targets -type f \( \
            -name "*.bin" -o -name "*.ubi" -o -name "*.itb" -o -name "*.img.gz" \
          \) -exec cp {} artifacts/ \;
          
          # 复制 manifest 和配置
          find bin/targets -name "*.manifest" -exec cp {} artifacts/ \;
          cp .config artifacts/build.config
          
          # 打包日志（仅当存在时）
          [ -d logs ] && tar -czf artifacts/build-logs.tar.gz logs/

      # 1️⃣3️⃣ 上传固件
      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        with:
          name: 360v6-openwrt-${{ github.run_number }}
          path: openwrt/artifacts/*
          retention-days: 7

      # 1️⃣4️⃣ 失败时上传日志（便于排查）
      - name: Upload Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.run_number }}
          path: |
            openwrt/logs/
            openwrt/build.log
          retention-days: 3
