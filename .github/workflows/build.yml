name: Build 360V6 OpenWrt

on:
  workflow_dispatch:  # 手动触发
  schedule:
    - cron: '0 0 * * 0'  # 每周日 00:00 UTC 自动构建
  push:
    branches: [main]
    paths:
      - '.config'
      - 'config/**'
      - 'scripts/**'
      - '.github/workflows/build.yml'

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    env:
      REPO_URL: https://github.com/immortalwrt/immortalwrt.git
      REPO_BRANCH: openwrt-23.05
      CONFIG_DIR: ${{ github.workspace }}/config
      SCRIPT_DIR: ${{ github.workspace }}/scripts

    steps:
      # 1️⃣ 检出代码
      - name: Checkout Project
        uses: actions/checkout@v4

      # 2️⃣ 系统依赖安装
      - name: Initialize Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git \
            libncurses5-dev libssl-dev python3 python3-pip \
            rsync unzip zlib1g-dev wget file zstd ccache
          # 确保 python3 指向正确版本
          if [ ! -f /usr/bin/python3.10 ]; then
            sudo apt-get install -y python3.10
          fi
          sudo update-alternatives --install /usr/bin/python3 python3 /usr/bin/python3.10 1

      # 3️⃣ 克隆源码
      - name: Clone Source Code
        uses: actions/checkout@v4
        with:
          repository: immortalwrt/immortalwrt
          ref: ${{ env.REPO_BRANCH }}
          path: openwrt
          fetch-depth: 1

      # 4️⃣ 缓存工具链（仅缓存编译产物，不缓存源码）
      # 注意：这里删除了 dl 目录的缓存，因为我们需要强制重新下载 luci
      - name: Cache OpenWrt Toolchain
        uses: actions/cache@v4
        with:
          path: |
            openwrt/staging_dir
            openwrt/build_dir/host*
          key: ${{ runner.os }}-toolchain-${{ hashFiles('config/base.config') }}-${{ env.REPO_BRANCH }}
          restore-keys: |
            ${{ runner.os }}-toolchain-

      # 🚫 删除了原来的 Step 5 (Feeds 缓存)，这是导致问题的根源

      # 5️⃣ 应用编译配置
      - name: Apply Configuration
        run: |
          cd openwrt
          # 复制基础配置
          cp ${{ env.CONFIG_DIR }}/base.config .config
          # 注入动态版本信息
          echo "CONFIG_VERSIONOPT=y" >> .config
          echo "CONFIG_VERSION_FILE_NAME=\"360V6-$(date +%Y%m%d)-${{ github.run_number }}\"" >> .config
          echo "CONFIG_VERSION_REPO=\"${{ github.server_url }}/${{ github.repository }}\"" >> .config

      # 6️⃣ 更新和安装 Feeds (核心修复步骤)
      - name: Update & Install Feeds
        run: |
          cd openwrt
          
          # 【强制清理】防止旧缓存污染
          rm -rf feeds tmp dl
          
          # 【写入配置】使用 tee 命令，最稳妥的方案
          # 注意：这里显式指定了 Luci 和 kiddin9 的正确地址
          tee feeds.conf.default > /dev/null << 'EOF'
          src-git packages https://git.openwrt.org/feed/packages.git
          src-git luci https://git.openwrt.org/project/luci.git^openwrt-23.05
          src-git routing https://git.openwrt.org/feed/routing.git
          src-git telephony https://git.openwrt.org/feed/telephony.git
          src-git passwall https://github.com/xiaorouji/openwrt-passwall.git;main
          src-git kiddin9 https://github.com/kiddin9/openwrt-packages.git;main
          EOF
          
          # 验证文件是否写入正确
          echo "=== feeds.conf.default 内容 ==="
          cat feeds.conf.default
          echo "================================"
          
          # 更新源（带重试）
          for i in 1 2 3; do
            ./scripts/feeds update -f && break
            echo "更新失败，重试中..."
            sleep 10
          done
          
          # 安装包
          ./scripts/feeds install -a

      # 7️⃣ 生成最终配置
      - name: Generate Defconfig
        run: |
          cd openwrt
          make defconfig

      # 8️⃣ 下载源码包
      - name: Download Dependencies
        run: |
          cd openwrt
          # 带重试机制
          for i in 1 2 3; do
            make download -j$(nproc) && break
            echo "下载失败，等待 15 秒重试..."
            sleep 15
          done

      # 9️⃣ 编译固件
      - name: Compile Firmware
        run: |
          cd openwrt
          # 优先并行编译，失败时自动降级单线程
          make -j$(nproc) || {
            echo "并行编译失败，降级为单线程编译..."
            make -j1 V=sc
          }

      # 🔟 整理产物
      - name: Organize Artifacts
        run: |
          cd openwrt
          mkdir -p artifacts
          # 复制固件
          find bin/targets -type f \( \
            -name "*.bin" -o -name "*.ubi" -o -name "*.itb" -o -name "*.img.gz" \
          \) -exec cp {} artifacts/ \;
          # 复制 manifest
          find bin/targets -name "*.manifest" -exec cp {} artifacts/ \;
          cp .config artifacts/build.config
          # 打包日志
          [ -d logs ] && tar -czf artifacts/build-logs.tar.gz logs/

      # 1️⃣1️⃣ 上传固件
      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        with:
          name: 360v6-openwrt-${{ github.run_number }}
          path: openwrt/artifacts/*
          retention-days: 7

      # 1️⃣2️⃣ 失败时上传日志
      - name: Upload Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.run_number }}
          path: |
            openwrt/logs/
            openwrt/build.log
          retention-days: 3
