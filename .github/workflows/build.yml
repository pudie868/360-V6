name: Build 360V6 OpenWrt

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'config/**'
      - 'files/**'
      - 'scripts/**'
      - '.github/workflows/build.yml'

# 【修复】明确最小权限，避免 GITHUB_TOKEN 默认写全权限
permissions:
  contents: write

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt.git
  REPO_BRANCH: openwrt-23.05
  DEVICE_NAME: 360V6

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      # ═══════════════════════════════════════════════════════════
      # 1️⃣ 检出本仓库（获取 config/ files/ scripts/）
      # ═══════════════════════════════════════════════════════════
      # 【修复】原来直接 checkout immortalwrt，导致本仓库的 config/files/scripts 永远不存在
      - name: Checkout This Repository
        uses: actions/checkout@v4
        with:
          path: repo
          fetch-depth: 1

      # ═══════════════════════════════════════════════════════════
      # 2️⃣ 克隆 immortalwrt 源码
      # ═══════════════════════════════════════════════════════════
      - name: Clone immortalwrt Source
        run: |
          git clone --depth 1 -b ${{ env.REPO_BRANCH }} ${{ env.REPO_URL }} openwrt
          echo "OPENWRT_HASH=$(git -C openwrt rev-parse --short HEAD)" >> $GITHUB_ENV

      # ═══════════════════════════════════════════════════════════
      # 3️⃣ 系统依赖 + 环境检查
      # ═══════════════════════════════════════════════════════════
      - name: Initialize Environment
        run: |
          echo "=== 安装系统依赖 ==="
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git \
            libncurses5-dev libssl-dev python3 python3-pip \
            rsync unzip zlib1g-dev wget file zstd ccache

          echo "✅ Python 版本: $(python3 --version)"

          echo "=== 磁盘空间检查 ==="
          FREE_GB=$(df --output=avail / | tail -1 | awk '{print int($1/1024/1024)}')
          echo "可用空间: ${FREE_GB}GB"
          if [ "$FREE_GB" -lt 20 ]; then
            echo "::warning::剩余 ${FREE_GB}GB < 20GB，尝试清理..."
            sudo docker system prune -af --volumes 2>/dev/null || true
            sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc 2>/dev/null || true
            FREE_GB=$(df --output=avail / | tail -1 | awk '{print int($1/1024/1024)}')
            echo "清理后: ${FREE_GB}GB"
          fi
          if [ "$FREE_GB" -lt 15 ]; then
            echo "::error::磁盘不足 ${FREE_GB}GB，编译可能失败"
          else
            echo "✅ 磁盘充足: ${FREE_GB}GB"
          fi

      # ═══════════════════════════════════════════════════════════
      # 4️⃣ 收集构建时间信息
      # ═══════════════════════════════════════════════════════════
      - name: Set Build Info
        run: |
          echo "BUILD_DATE=$(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_ENV
          echo "BUILD_TIMESTAMP=$(date +%s)" >> $GITHUB_ENV

      # ═══════════════════════════════════════════════════════════
      # 5️⃣ 显示构建信息
      # ═══════════════════════════════════════════════════════════
      - name: Show Build Info
        run: |
          echo "╔══════════════════════════════════════════════════════════╗"
          echo "║            360V6 OpenWrt 构建系统                        ║"
          echo "╠══════════════════════════════════════════════════════════╣"
          echo "║ 设备: ${{ env.DEVICE_NAME }}"
          echo "║ 分支: ${{ env.REPO_BRANCH }}"
          echo "║ 源码: ${{ env.OPENWRT_HASH }}"
          echo "║ 运行编号: Run_#${{ github.run_number }}"
          echo "║ CPU: $(nproc) 核"
          echo "║ 内存: $(free -h | awk '/^Mem:/ {print $2}')"
          echo "║ 磁盘: $(df -h / | awk 'NR==2 {print $4}') 可用"
          echo "╚══════════════════════════════════════════════════════════╝"

      # ═══════════════════════════════════════════════════════════
      # 6️⃣ 缓存工具链
      # ═══════════════════════════════════════════════════════════
      # 【修复】cache key 中的 openwrt 文件必须在克隆后才能 hash，
      #         改为在克隆完成后用 OPENWRT_HASH 替代文件 hash
      - name: Cache OpenWrt Toolchain
        uses: actions/cache@v4
        with:
          path: |
            openwrt/staging_dir
            openwrt/build_dir/host*
            openwrt/build_dir/toolchain-*
            openwrt/.ccache
          key: ${{ runner.os }}-toolchain-${{ env.REPO_BRANCH }}-${{ env.OPENWRT_HASH }}-${{ hashFiles('repo/config/base.config') }}
          restore-keys: |
            ${{ runner.os }}-toolchain-${{ env.REPO_BRANCH }}-${{ env.OPENWRT_HASH }}-
            ${{ runner.os }}-toolchain-${{ env.REPO_BRANCH }}-

      # ═══════════════════════════════════════════════════════════
      # 7️⃣ 应用编译配置 & 覆盖 files/
      # ═══════════════════════════════════════════════════════════
      - name: Apply Configuration
        run: |
          cd openwrt

          CONFIG_FILE="${GITHUB_WORKSPACE}/repo/config/base.config"
          if [ ! -f "$CONFIG_FILE" ]; then
            echo "::error::配置文件不存在: $CONFIG_FILE"
            exit 1
          fi

          echo "=== 应用基础配置 ==="
          cp "$CONFIG_FILE" .config

          echo "=== 注入动态版本信息 ==="
          cat >> .config << EOF
          CONFIG_VERSIONOPT=y
          CONFIG_VERSION_FILE_NAME="${{ env.DEVICE_NAME }}-$(date +%Y%m%d)-${{ github.run_number }}"
          CONFIG_VERSION_REPO="${{ github.server_url }}/${{ github.repository }}"
          EOF

          echo "=== 覆盖 files/ 目录 ==="
          if [ -d "${GITHUB_WORKSPACE}/repo/files" ]; then
            cp -r "${GITHUB_WORKSPACE}/repo/files/." ./files/
            # 确保 uci-defaults 脚本可执行
            find files/etc/uci-defaults/ -type f -exec chmod +x {} \; 2>/dev/null || true
            echo "✅ files/ 已覆盖"
          fi

          echo "✅ 配置已应用"

      # ═══════════════════════════════════════════════════════════
      # 8️⃣ 更新和安装 Feeds
      # ═══════════════════════════════════════════════════════════
      - name: Update & Install Feeds
        run: |
          cd openwrt
          rm -rf feeds tmp dl

          echo "=== 配置 feeds ==="
          # 修正可能存在的错误 feed URL
          sed -i \
            -e 's|https://fastly.jsdelivr.net/gh/kiddin9/openwrt-packages.*|https://github.com/kiddin9/openwrt-packages.git;main|g' \
            -e 's|https://git.openwrt.org/project/luci.git.*|https://git.openwrt.org/project/luci.git;openwrt-23.05|g' \
            feeds.conf.default

          # 添加 passwall feed（幂等）
          grep -q "passwall" feeds.conf.default \
            || echo "src-git passwall https://github.com/xiaorouji/openwrt-passwall.git;main" >> feeds.conf.default

          echo "=== feeds.conf.default ==="
          cat feeds.conf.default

          echo "=== 更新 feeds（最多重试 3 次）==="
          for i in 1 2 3; do
            echo "尝试 $i/3..."
            ./scripts/feeds update -f 2>&1 | tee feeds-update.log && break
            [ $i -eq 3 ] && { echo "::error::feeds 更新失败"; tail -20 feeds-update.log; exit 1; }
            sleep $((i * 15))
          done

          echo "=== 安装 feeds ==="
          ./scripts/feeds install -a 2>&1 | tee feeds-install.log \
            || { echo "::error::feeds 安装失败"; exit 1; }

          echo "=== 验证关键包 ==="
          ./scripts/feeds list | grep -q "luci" \
            || { echo "::error::未找到 luci 包"; exit 1; }
          echo "✅ feeds 完成"

      # ═══════════════════════════════════════════════════════════
      # 9️⃣ 生成最终配置
      # ═══════════════════════════════════════════════════════════
      - name: Generate Defconfig
        run: |
          cd openwrt
          make defconfig 2>&1 | tee defconfig.log
          if grep -q "CONFIG_TARGET.*qualcommax" .config; then
            echo "✅ 目标平台 qualcommax 已确认"
          else
            echo "::error::未找到 qualcommax 目标，请检查 base.config"
            exit 1
          fi

      # ═══════════════════════════════════════════════════════════
      # 🔟 下载源码包
      # ═══════════════════════════════════════════════════════════
      - name: Download Dependencies
        run: |
          cd openwrt
          for i in 1 2 3 4; do
            echo "下载尝试 $i/4..."
            make download -j$(nproc) 2>&1 | tee download.log && break
            [ $i -eq 4 ] && { echo "::error::下载失败"; tail -50 download.log; exit 1; }
            echo "等待 $((i * 30))s 后重试..."
            sleep $((i * 30))
          done
          find dl -type f \( -size 0 -o -name "*.tmp" \) -delete 2>/dev/null || true
          echo "✅ 依赖包准备完成"

      # ═══════════════════════════════════════════════════════════
      # 1️⃣1️⃣ 编译固件
      # ═══════════════════════════════════════════════════════════
      - name: Compile Firmware
        id: compile
        run: |
          cd openwrt
          echo "=== 开始编译 ($(nproc) 核) ==="

          # 启用 ccache
          export PATH="/usr/lib/ccache:$PATH"
          export CCACHE_DIR=$PWD/.ccache
          ccache -M 5G 2>/dev/null || true

          COMPILE_OK=false
          if make -j$(nproc) V=sc BUILD_LOG=1 2>&1 | tee build.log; then
            echo "✅ 并行编译成功"
            COMPILE_OK=true
          else
            echo "::warning::并行编译失败，切换单线程..."
            if make -j1 V=sc BUILD_LOG=1 2>&1 | tee -a build.log; then
              echo "✅ 单线程编译成功"
              COMPILE_OK=true
            fi
          fi

          if [ "$COMPILE_OK" = "false" ]; then
            echo "::error::编译失败"
            echo "status=failure" >> $GITHUB_OUTPUT
            mkdir -p error_logs
            find logs -name "*.txt" -exec grep -l -i "error\|failed" {} \; 2>/dev/null \
              | head -5 | xargs -I{} cp {} error_logs/ 2>/dev/null || true
            tail -100 build.log
            exit 1
          fi

          echo "status=success" >> $GITHUB_OUTPUT
          ccache -s 2>/dev/null || true

          # 【修复】BUILD_DURATION 需要在同一步骤内计算并写入环境
          BUILD_END=$(date +%s)
          BUILD_DURATION=$((BUILD_END - ${{ env.BUILD_TIMESTAMP }}))
          echo "BUILD_DURATION=$BUILD_DURATION" >> $GITHUB_ENV
          echo "BUILD_DURATION_MIN=$((BUILD_DURATION / 60))" >> $GITHUB_ENV

          FIRMWARE_COUNT=$(find bin/targets -type f \
            \( -name "*.bin" -o -name "*.ubi" -o -name "*.itb" -o -name "*.img.gz" \) \
            2>/dev/null | wc -l)
          [ "$FIRMWARE_COUNT" -eq 0 ] && \
            { echo "::error::未找到固件文件"; ls -R bin/targets 2>/dev/null | head -30; exit 1; }
          echo "✅ 找到 $FIRMWARE_COUNT 个固件，耗时 $((BUILD_DURATION/60))m$((BUILD_DURATION%60))s"

      # ═══════════════════════════════════════════════════════════
      # 1️⃣2️⃣ 整理产物
      # ═══════════════════════════════════════════════════════════
      - name: Organize Artifacts
        if: steps.compile.outputs.status == 'success'
        run: |
          cd openwrt
          mkdir -p artifacts

          # 固件
          find bin/targets -type f \
            \( -name "*.bin" -o -name "*.ubi" -o -name "*.itb" -o -name "*.img.gz" \) \
            -exec cp -v {} artifacts/ \;

          # 附属文件
          find bin/targets \( -name "*.manifest" -o -name "sha256sums" \) \
            -exec cp -v {} artifacts/ \; 2>/dev/null || true

          cp .config artifacts/build.config

          # 包索引（opkg）
          make package/index 2>/dev/null || echo "::warning::包索引生成失败（非致命）"

          # MD5 校验
          find artifacts -maxdepth 1 -type f \
            \( -name "*.bin" -o -name "*.ubi" -o -name "*.itb" \) \
            -exec md5sum {} \; > artifacts/checksums.txt

          # 日志
          [ -f build.log ] && {
            tail -5000 build.log > artifacts/build.log.tail
            gzip -c build.log > artifacts/build.log.gz
          }
          [ -d logs ] && tar -czf artifacts/build-logs.tar.gz logs/ 2>/dev/null || true

          # 产物清单
          # 【修复】使用已正确写入 env 的 BUILD_DURATION_MIN
          cat > artifacts/MANIFEST.txt << EOF
          === 产物清单 ===
          时间: ${{ env.BUILD_DATE }}
          运行编号: Run_#${{ github.run_number }}
          源码分支: ${{ env.REPO_BRANCH }}
          源码 commit: ${{ env.OPENWRT_HASH }}
          设备: ${{ env.DEVICE_NAME }}
          构建耗时: ${{ env.BUILD_DURATION_MIN }} 分钟
          EOF
          echo "" >> artifacts/MANIFEST.txt
          echo "文件列表:" >> artifacts/MANIFEST.txt
          echo "─────────────────────────────────" >> artifacts/MANIFEST.txt
          ls -lh artifacts/ | grep -v "^total" >> artifacts/MANIFEST.txt

          echo "✅ 产物整理完成"
          ls -lh artifacts/

      # ═══════════════════════════════════════════════════════════
      # 1️⃣3️⃣ 收集 Release 文件列表
      # ═══════════════════════════════════════════════════════════
      - name: Collect Release Files
        if: steps.compile.outputs.status == 'success'
        id: release-files
        run: |
          cd openwrt/artifacts
          # 【修复】使用换行符分隔（softprops/action-gh-release 支持多行文件列表）
          # 避免空格分隔在路径含特殊字符时的解析问题
          FILES=$(find . -maxdepth 1 -type f \( \
            -name "*-factory.ubi" \
            -o -name "*-sysupgrade.bin" \
            -o -name "*-initramfs*.itb" \
            -o -name "*.manifest" \
            -o -name "checksums.txt" \
            -o -name "sha256sums" \
          \) | sort | sed 's|^\./|openwrt/artifacts/|')

          if [ -z "$FILES" ]; then
            echo "::warning::未找到 Release 文件"
            echo "release_files=" >> $GITHUB_OUTPUT
          else
            echo "找到文件:"
            echo "$FILES"
            # 写入多行 output（GitHub Actions 支持 heredoc 格式）
            {
              echo "release_files<<EOF"
              echo "$FILES"
              echo "EOF"
            } >> $GITHUB_OUTPUT
          fi

      # ═══════════════════════════════════════════════════════════
      # 1️⃣4️⃣ 上传 Artifacts
      # ═══════════════════════════════════════════════════════════
      - name: Upload Firmware Artifacts
        if: steps.compile.outputs.status == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.DEVICE_NAME }}-openwrt-${{ github.run_number }}
          path: openwrt/artifacts/*
          retention-days: 7
          if-no-files-found: error

      # ═══════════════════════════════════════════════════════════
      # 1️⃣5️⃣ 创建 GitHub Release（仅 main 分支 push）
      # ═══════════════════════════════════════════════════════════
      - name: Create Release
        if: >
          steps.compile.outputs.status == 'success' &&
          github.event_name == 'push' &&
          github.ref == 'refs/heads/main' &&
          steps.release-files.outputs.release_files != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.DEVICE_NAME }}-v${{ github.run_number }}
          name: "${{ env.DEVICE_NAME }} OpenWrt Build #${{ github.run_number }}"
          body: |
            ## 📦 固件信息
            | 项目 | 内容 |
            |------|------|
            | **构建时间** | ${{ env.BUILD_DATE }} |
            | **运行编号** | #${{ github.run_number }} |
            | **源码分支** | ${{ env.REPO_BRANCH }} |
            | **源码 commit** | ${{ env.OPENWRT_HASH }} |
            | **目标设备** | ${{ env.DEVICE_NAME }} |
            | **构建耗时** | ${{ env.BUILD_DURATION_MIN }} 分钟 |

            ## 📌 刷机指南
            | 场景 | 文件 |
            |------|------|
            | 首次刷入 | `*-factory.ubi` |
            | 系统升级 | `*-sysupgrade.bin` |
            | 救砖模式 | `*-initramfs*.itb` |

            ## 🔧 默认配置
            - 管理 IP: `192.168.2.1`
            - 用户名: `root`
            - 密码: *(无，首次登录请设置)*

            ## ⚠️ 免责声明
            刷机有风险，请确保理解操作后果。本固件按原样提供，不承担任何责任。
          files: ${{ steps.release-files.outputs.release_files }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ═══════════════════════════════════════════════════════════
      # 1️⃣6️⃣ 失败时上传诊断日志
      # ═══════════════════════════════════════════════════════════
      - name: Upload Diagnostic Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: diagnostics-${{ env.DEVICE_NAME }}-${{ github.run_number }}
          path: |
            openwrt/build.log
            openwrt/build.log.gz
            openwrt/.config
            openwrt/feeds.conf.default
            openwrt/feeds-update.log
            openwrt/feeds-install.log
            openwrt/defconfig.log
            openwrt/logs/
            openwrt/error_logs/
          retention-days: 7
          if-no-files-found: ignore

      - name: Send Failure Notification
        if: failure()
        run: |
          echo "::error::构建失败！Run_#${{ github.run_number }}"
          echo "请下载诊断日志 diagnostics-${{ env.DEVICE_NAME }}-${{ github.run_number }} 查看详情"
