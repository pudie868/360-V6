name: Build 360V6 OpenWrt

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'config/**'
      - 'files/**'
      - 'scripts/**'
      - '.github/workflows/build.yml'

permissions:
  contents: write

env:
  # ═══════════════════════════════════════════════════════════
  # 🚀 关键修改 1：使用 VIKINGYFY 的高通专用 Fork
  # ═══════════════════════════════════════════════════════════
  REPO_URL: https://github.com/VIKINGYFY/immortalwrt.git
  REPO_BRANCH: ipq60xx-devel  # 或 main（视该仓库最新分支而定）
  DEVICE_NAME: 360V6

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    steps:
      # ═══════════════════════════════════════════════════════════
      # 1️⃣ 检出本仓库（获取 config/files/scripts）
      # ═══════════════════════════════════════════════════════════
      - name: Checkout This Repository
        uses: actions/checkout@v4
        with:
          path: repo
          fetch-depth: 1

      # ═══════════════════════════════════════════════════════════
      # 2️⃣ 克隆 immortalwrt 源码（高通平台专用）
      # ═══════════════════════════════════════════════════════════
      - name: Clone immortalwrt Source
        run: |
          git clone --depth 1 -b ${{ env.REPO_BRANCH }} ${{ env.REPO_URL }} openwrt
          echo "OPENWRT_HASH=$(git -C openwrt rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "源码版本: $(git -C openwrt log -1 --oneline)"

      # ═══════════════════════════════════════════════════════════
      # 3️⃣ 系统依赖 + 环境检查
      # ═══════════════════════════════════════════════════════════
      - name: Initialize Environment
        run: |
          echo "=== 安装系统依赖 ==="
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git \
            libncurses5-dev libssl-dev python3 python3-pyelftools \
            python3-setuptools python3-yaml python3-mako \
            rsync unzip zlib1g-dev wget file zstd ccache \
            libelf-dev device-tree-compiler
          
          echo "✅ Python 版本: $(python3 --version)"
          echo "=== 磁盘空间检查 ==="
          FREE_GB=$(df --output=avail / | tail -1 | awk '{print int(\$1/1024/1024)}')
          echo "可用空间: \${FREE_GB}GB"
          if [ "$FREE_GB" -lt 25 ]; then
            echo "::warning::剩余 ${FREE_GB}GB < 25GB，尝试清理..."
            sudo docker system prune -af --volumes 2>/dev/null || true
            sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc 2>/dev/null || true
            FREE_GB=$(df --output=avail / | tail -1 | awk '{print int(\$1/1024/1024)}')
            echo "清理后: \${FREE_GB}GB"
          fi

      # ═══════════════════════════════════════════════════════════
      # 4️⃣ 缓存工具链
      # ═══════════════════════════════════════════════════════════
      - name: Cache OpenWrt Toolchain
        uses: actions/cache@v4
        with:
          path: |
            openwrt/staging_dir
            openwrt/build_dir/host*
            openwrt/build_dir/toolchain-*
            openwrt/.ccache
          key: ${{ runner.os }}-toolchain-viking-${{ env.REPO_BRANCH }}-${{ env.OPENWRT_HASH }}-${{ hashFiles('repo/config/base.config') }}
          restore-keys: |
            ${{ runner.os }}-toolchain-viking-${{ env.REPO_BRANCH }}-
            ${{ runner.os }}-toolchain-

      # ═══════════════════════════════════════════════════════════
      # 5️⃣ 🚀 核心步骤：配置 + Feeds + Defconfig
      # ═══════════════════════════════════════════════════════════
      - name: Configure OpenWrt
        run: |
          cd openwrt
          
          # ---------- A. 应用配置文件 ----------
          CONFIG_FILE="${GITHUB_WORKSPACE}/repo/config/base.config"
          if [ ! -f "$CONFIG_FILE" ]; then
            echo "::error::配置文件不存在: $CONFIG_FILE"
            exit 1
          fi
          echo "=== 应用配置文件 ==="
          cp -f "$CONFIG_FILE" .config
          
          # ---------- B. 覆盖 files 目录 ----------
          if [ -d "${GITHUB_WORKSPACE}/repo/files" ]; then
            echo "=== 覆盖 files/ 目录 ==="
            rm -rf files 2>/dev/null || true
            cp -r "${GITHUB_WORKSPACE}/repo/files" ./files
            # 确保 uci-defaults 脚本可执行
            find files/etc/uci-defaults/ -type f -exec chmod +x {} \; 2>/dev/null || true
            echo "✅ files 目录已覆盖"
          fi
          
          # ---------- C. 配置 Feeds（关键修改 2）----------
          echo "=== 配置 feeds ==="
          # VIKINGYFY 的 fork 通常已包含优化 feeds，谨慎修改
          # 如需额外软件源，建议追加而非替换
          
          # 添加 Passwall（如需）
          if ! grep -q "passwall" feeds.conf.default 2>/dev/null; then
            echo "src-git passwall https://github.com/xiaorouji/openwrt-passwall.git;main" >> feeds.conf.default
            echo "✅ Passwall feed 已添加"
          fi
          
          # ---------- D. 更新与安装 Feeds ----------
          echo "=== 更新 feeds ==="
          # 带重试机制
          for i in 1 2 3; do
            echo "尝试 $i/3..."
            ./scripts/feeds update -f 2>&1 | tee feeds-update.log && break
            [ $i -eq 3 ] && { echo "::error::feeds 更新失败"; tail -20 feeds-update.log; exit 1; }
            sleep $((i * 15))
          done
          
          echo "=== 安装 feeds ==="
          ./scripts/feeds install -a 2>&1 | tee feeds-install.log || \
            { echo "::error::feeds 安装失败"; exit 1; }
          
          # ---------- E. 生成最终配置 (Defconfig) ----------
          echo "=== 生成最终配置 ==="
          make defconfig
          
          # ---------- F. 验证目标设备 ----------
          echo "=== 验证目标设备 ==="
          if grep -q "CONFIG_TARGET_qualcommax_ipq60xx_DEVICE_qihoo_360v6=y" .config; then
            echo "✅ 目标设备 360V6 (Qihoo 360V6) 已确认"
          elif grep -q "CONFIG_TARGET_qualcommax=y" .config; then
            echo "✅ 目标平台 qualcommax 已确认，检查具体设备..."
            grep "CONFIG_TARGET.*DEVICE" .config | head -5
          else
            echo "::error::❌ 未找到目标设备配置！请检查 base.config 内容"
            echo "当前 .config 目标部分："
            grep "CONFIG_TARGET" .config | head -10
            exit 1
          fi
          
          # 显示最终配置摘要
          echo "=== 编译目标摘要 ==="
          grep -E "^(CONFIG_TARGET|CONFIG_PACKAGE_kmod-ath11k|CONFIG_PACKAGE_kmod-qca)" .config | head -20

      # ═══════════════════════════════════════════════════════════
      # 6️⃣ 下载依赖包
      # ═══════════════════════════════════════════════════════════
      - name: Download Dependencies
        run: |
          cd openwrt
          echo "=== 开始下载依赖包 ==="
          for i in 1 2 3 4; do
            echo "下载尝试 $i/4..."
            make download -j$(nproc) 2>&1 | tee download.log && break
            [ $i -eq 4 ] && { echo "::error::下载失败"; tail -50 download.log; exit 1; }
            echo "等待 $((i * 30))s 后重试..."
            sleep $((i * 30))
          done
          find dl -type f \( -size 0 -o -name "*.tmp" \) -delete 2>/dev/null || true
          echo "✅ 依赖包准备完成"

      # ═══════════════════════════════════════════════════════════
      # 7️⃣ 编译固件
      # ═══════════════════════════════════════════════════════════
      - name: Compile Firmware
        id: compile
        run: |
          cd openwrt
          echo "=== 开始编译 ($(nproc) 核) ==="
          export PATH="/usr/lib/ccache:$PATH"
          export CCACHE_DIR=$PWD/.ccache
          ccache -M 10G  # 增大缓存以应对大型 NSS 驱动编译
          ccache -s
          
          COMPILE_OK=false
          # 尝试并行编译
          if make -j$(nproc) V=sc 2>&1 | tee build.log; then
            echo "✅ 并行编译成功"
            COMPILE_OK=true
          else
            echo "::warning::并行编译失败，切换单线程..."
            if make -j1 V=sc 2>&1 | tee -a build.log; then
              echo "✅ 单线程编译成功"
              COMPILE_OK=true
            fi
          fi
          
          if [ "$COMPILE_OK" = "false" ]; then
            echo "::error::编译失败"
            mkdir -p error_logs
            [ -d logs ] && find logs -name "*.txt" -exec grep -l -i "error\|failed" {} \; 2>/dev/null | head -5 | xargs -I{} cp {} error_logs/ || true
            tail -100 build.log
            exit 1
          fi
          
          echo "status=success" >> $GITHUB_OUTPUT
          ccache -s

      # ═══════════════════════════════════════════════════════════
      # 8️⃣ 整理产物
      # ═══════════════════════════════════════════════════════════
      - name: Organize Artifacts
        if: steps.compile.outputs.status == 'success'
        run: |
          cd openwrt
          mkdir -p artifacts
          
          # 复制固件（高通平台通常生成 .ubi 和 .bin）
          find bin/targets/qualcommax/ipq60xx -type f \( -name "*.bin" -o -name "*.ubi" -o -name "*.itb" -o -name "*.img.gz" \) -exec cp -v {} artifacts/ \;
          
          # 复制校验文件
          find bin/targets/qualcommax/ipq60xx \( -name "*.manifest" -o -name "sha256sums" \) -exec cp -v {} artifacts/ \;
          
          # 保存配置
          cp .config artifacts/build.config
          
          # 压缩日志
          [ -f build.log ] && gzip -c build.log > artifacts/build.log.gz
          [ -d logs ] && tar -czf artifacts/build-logs.tar.gz logs/ 2>/dev/null || true
          
          echo "=== 产物列表 ==="
          ls -lh artifacts/

      # ═══════════════════════════════════════════════════════════
      # 9️⃣ 上传固件
      # ═══════════════════════════════════════════════════════════
      - name: Upload Firmware Artifacts
        if: steps.compile.outputs.status == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.DEVICE_NAME }}-immortalwrt-${{ github.run_number }}
          path: openwrt/artifacts/*
          retention-days: 7
