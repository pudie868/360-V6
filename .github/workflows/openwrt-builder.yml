name: Build OpenWrt for 360 V6
on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - '.github/workflows/openwrt-builder.yml'
env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: main
  TZ: Asia/Shanghai
  ARGON_TAG: "v2.3.1"
jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    permissions:
      contents: write
    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v4

      - name: 🗑️ 释放磁盘空间
        run: |
          set -euo pipefail
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/local/share/boost /usr/share/swift /usr/local/.ghcup /usr/lib/jvm
          sudo docker system prune -af --volumes 2>/dev/null || true
          sudo apt-get autoremove -y --purge && sudo apt-get clean
          sudo swapoff -a && sudo rm -f /swapfile /mnt/swapfile
          df -h
          FREE_GB=$(df -BG / | tail -1 | xargs | cut -d' ' -f4 | tr -d 'G')
          echo "📊 当前可用空间: ${FREE_GB}GB"
          if [ "$FREE_GB" -lt 40 ]; then
            echo "❌ 剩余磁盘空间不足 40GB，编译可能失败"
            exit 1
          fi

      - name: 🛠️ 安装编译依赖
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses5-dev libssl-dev python3 python3-pip rsync \
            swig unzip zlib1g-dev wget curl ca-certificates file golang-go \
            libelf-dev libncurses-dev zstd pkg-config ccache libzstd-dev
          sudo timedatectl set-timezone "$TZ"
          git config --global init.defaultBranch main
          git config --global pull.rebase false
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git config --global url."https://".insteadOf "git://"
          mkdir -p /opt/ccache
          ccache -M 10G
          ccache -z

      - name: 📥 克隆 OpenWrt 源码
        run: |
          set -euo pipefail
          git clone --depth 1 -b $REPO_BRANCH $REPO_URL openwrt
          cd openwrt
          OPENWRT_COMMIT=$(git rev-parse HEAD 2>/dev/null || echo "unknown")
          echo "OPENWRT_COMMIT=${OPENWRT_COMMIT}" >> $GITHUB_ENV
          echo "BUILD_DATE=$(date '+%Y-%m-%d')" >> $GITHUB_ENV
          echo "📋 OpenWrt 信息: 分支=$REPO_BRANCH, Commit=${OPENWRT_COMMIT}"

      - name: 📦 安装第三方插件
        run: |
          set -euo pipefail
          cd openwrt

          gh_download() {
            local url="\$1" dest="\$2" retry=0 success=false
            while [ $retry -lt 3 ] && [ "$success" = false ]; do
              local tmp=$(mktemp /tmp/pkg_XXXXXX.tar.gz)
              echo "📥 下载 (尝试 $((retry+1))/3): $url"
              if curl -fSL --retry 3 --retry-delay 10 --connect-timeout 60 \
                -H "User-Agent: GitHubActions/OpenWrtBuilder" -o "$tmp" "$url" 2>/dev/null; then
                if [ -s "$tmp" ] && gzip -t "$tmp" 2>/dev/null; then
                  mkdir -p "$dest"
                  tar -xzf "$tmp" -C "$dest" --strip-components=1
                  rm -f "$tmp"
                  success=true
                  echo "✅ 安装完成: $dest"
                else
                  rm -f "$tmp"
                  retry=$((retry+1))
                  [ $retry -lt 3 ] && sleep 5
                fi
              else
                rm -f "$tmp"
                retry=$((retry+1))
                [ $retry -lt 3 ] && sleep 10
              fi
            done
            [ "$success" = false ] && return 1
          }

          rm -rf package/lean/luci-theme-argon 2>/dev/null || true
          gh_download "https://github.com/jerrykuku/luci-theme-argon/archive/refs/tags/${ARGON_TAG}.tar.gz" "package/luci-theme-argon"

          echo "📥 克隆 homeproxy..."
          [ -d "package/homeproxy" ] && echo "⚠️ 已存在，跳过" || \
            git clone --depth 1 --branch master --single-branch https://github.com/immortalwrt/homeproxy.git package/homeproxy || \
            git clone --depth 1 https://github.com/immortalwrt/homeproxy.git package/homeproxy || exit 1
          echo "✅ homeproxy 完成"

          echo "📥 克隆 luci-app-lucky..."
          [ -d "package/luci-app-lucky" ] && echo "⚠️ 已存在，跳过" || \
            git clone --depth 1 https://github.com/gdy666/luci-app-lucky.git package/luci-app-lucky || exit 1
          echo "✅ luci-app-lucky 完成"

          echo "📥 克隆 luci-app-filebrowser..."
          [ -d "package/luci-app-filebrowser" ] && echo "⚠️ 已存在，跳过" || \
            git clone --depth 1 https://github.com/xiaorouji/openwrt-filebrowser.git package/luci-app-filebrowser || echo "⚠️ 跳过"
          echo "✅ luci-app-filebrowser 完成"

          echo "📥 克隆 kiddin9..."
          [ -d "package/kiddin9-packages" ] && echo "⚠️ 已存在，跳过" || \
            git clone --depth 1 https://github.com/kiddin9/openwrt-packages.git package/kiddin9-packages || echo "⚠️ 跳过"
          echo "✅ kiddin9 完成"

      - name: 🔄 更新 Feeds
        run: |
          set -euo pipefail
          cd openwrt
          [ -f "feeds.conf.default" ] && grep -v "kiddin9" feeds.conf.default > feeds.conf.default.tmp && mv feeds.conf.default.tmp feeds.conf.default
          echo "📥 更新 Feeds..."
          n=0; until [ "$n" -ge 3 ]; do
            ./scripts/feeds update -a && break
            n=$((n+1))
            [ $n -lt 3 ] && sleep $((n * 15 + 10))
          done
          echo "📥 安装 Feeds..."
          ./scripts/feeds install -a || echo "⚠️ 部分 feeds 安装失败"

      - name: 📁 同步自定义配置
        run: |
          cd openwrt
          if [ -d "../files" ]; then
            cp -rf ../files .
            mkdir -p files/etc/uci-defaults/ files/etc/sysctl.d/
            chmod +x files/etc/uci-defaults/*.sh 2>/dev/null || true
            echo "✅ 自定义配置已就绪"
          else
            echo "⚠️ 未找到 files/ 目录"
          fi

      - name: ⚙️ 生成 .config
        run: |
          set -euo pipefail
          cd openwrt
          echo 'CONFIG_TARGET_qualcommax=y
CONFIG_TARGET_qualcommax_ipq60xx=y
CONFIG_TARGET_qualcommax_ipq60xx_DEVICE_qihoo_360v6=y
CONFIG_TARGET_ROOTFS_PARTSIZE=200
CONFIG_TARGET_ROOTFS_SQUASHFS=y
CONFIG_CCACHE=y
CONFIG_SSTRIP=y
CONFIG_TARGET_KERNEL_PARTSIZE=32
CONFIG_KERNEL_PERF_EVENTS=y
CONFIG_PACKAGE_kmod-cpufreq-dt=y
CONFIG_PACKAGE_kmod-cpufreq-dt-platdev=y
CONFIG_PACKAGE_cpufreq-utils=y
CONFIG_PACKAGE_luci=y
CONFIG_PACKAGE_luci-base=y
CONFIG_PACKAGE_luci-compat=y
CONFIG_PACKAGE_luci-lib-ipkg=y
CONFIG_PACKAGE_luci-ssl=y
CONFIG_PACKAGE_luci-theme-bootstrap=y
CONFIG_PACKAGE_luci-theme-argon=y
CONFIG_LUCI_LANG_zh-cn=y
CONFIG_LUCI_LANG_zh_Hans=y
CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
CONFIG_PACKAGE_luci-i18n-firewall-zh-cn=y
CONFIG_PACKAGE_luci-i18n-opkg-zh-cn=y
CONFIG_PACKAGE_dnsmasq-full=y
# CONFIG_PACKAGE_dnsmasq is not set
CONFIG_PACKAGE_firewall4=y
CONFIG_PACKAGE_nftables=y
CONFIG_PACKAGE_kmod-nft-offload=y
CONFIG_PACKAGE_kmod-nft-nat=y
# CONFIG_PACKAGE_kmod-ipt-nat6 is not set
# CONFIG_PACKAGE_kmod-ipt-nat is not set
# CONFIG_PACKAGE_iptables is not set
CONFIG_PACKAGE_opkg=y
CONFIG_PACKAGE_kmod-ath11k=y
CONFIG_PACKAGE_kmod-ath11k-ahb=y
CONFIG_PACKAGE_ath11k-firmware-ipq6010=y
# CONFIG_PACKAGE_kmod-ath11k-pci is not set
# CONFIG_PACKAGE_kmod-ath10k-ct is not set
# CONFIG_PACKAGE_ath11k-firmware-qcn9074 is not set
CONFIG_PACKAGE_luci-app-homeproxy=y
CONFIG_PACKAGE_luci-i18n-homeproxy-zh-cn=y
CONFIG_PACKAGE_sing-box=y
CONFIG_PACKAGE_luci-app-adguardhome=y
CONFIG_PACKAGE_adguardhome=y
CONFIG_PACKAGE_luci-i18n-adguardhome-zh-cn=y
CONFIG_PACKAGE_luci-app-turboacc=y
CONFIG_PACKAGE_luci-i18n-turboacc-zh-cn=y
CONFIG_PACKAGE_kmod-fast-classifier=y
CONFIG_PACKAGE_kmod-shortcut-fe=y
CONFIG_PACKAGE_kmod-shortcut-fe-drv=y
CONFIG_PACKAGE_luci-app-lucky=y
CONFIG_PACKAGE_lucky=y
CONFIG_PACKAGE_luci-app-filebrowser=y
CONFIG_PACKAGE_filebrowser=y
CONFIG_PACKAGE_docker=y
CONFIG_PACKAGE_dockerd=y
CONFIG_PACKAGE_luci-app-docker=y
CONFIG_PACKAGE_luci-app-dockerman=y
CONFIG_PACKAGE_luci-i18n-dockerman-zh-cn=y
CONFIG_PACKAGE_kmod-veth=y
CONFIG_PACKAGE_kmod-br-netfilter=y
CONFIG_PACKAGE_kmod-nft-bridge=y
CONFIG_PACKAGE_kmod-ipt-extra=y
CONFIG_PACKAGE_kmod-ipt-physdev=y
CONFIG_PACKAGE_kmod-lib-crc32c=y
CONFIG_PACKAGE_kmod-crypto-crc32c=y
CONFIG_PACKAGE_kmod-dm=y
CONFIG_PACKAGE_kmod-overlay=y
CONFIG_PACKAGE_kmod-tcp-bbr=y
CONFIG_PACKAGE_kmod-zram=y
CONFIG_PACKAGE_zram-swap=y
CONFIG_PACKAGE_luci-app-ttyd=y
CONFIG_PACKAGE_luci-i18n-ttyd-zh-cn=y
CONFIG_PACKAGE_kmod-usb-storage=y
CONFIG_PACKAGE_kmod-usb-storage-uas=y
CONFIG_PACKAGE_kmod-usb3=y
CONFIG_PACKAGE_kmod-fs-ext4=y
CONFIG_PACKAGE_kmod-fs-exfat=y
CONFIG_PACKAGE_kmod-fs-vfat=y
CONFIG_PACKAGE_kmod-fs-ntfs3=y
CONFIG_PACKAGE_block-mount=y
CONFIG_PACKAGE_kmod-fuse=y
CONFIG_PACKAGE_e2fsprogs=y
CONFIG_PACKAGE_fdisk=y
CONFIG_PACKAGE_bash=y
CONFIG_PACKAGE_htop=y
CONFIG_PACKAGE_curl=y
CONFIG_PACKAGE_wget-ssl=y
CONFIG_PACKAGE_file=y
CONFIG_PACKAGE_lsblk=y
# CONFIG_PACKAGE_luci-app-dnsfilter is not set
# CONFIG_PACKAGE_luci-app-openclash is not set
# CONFIG_PACKAGE_luci-app-mosdns is not set
# CONFIG_PACKAGE_smartdns is not set
# CONFIG_PACKAGE_luci-app-samba4 is not set
# CONFIG_PACKAGE_xray-core is not set
# CONFIG_PACKAGE_hysteria is not set
# CONFIG_PACKAGE_naiveproxy is not set
# CONFIG_PACKAGE_tuic-client is not set
# CONFIG_PACKAGE_netdata is not set
# CONFIG_PACKAGE_vnstat2 is not set' > .config
          make defconfig
          echo "✅ .config 生成完成"

      - name: 🩹 清理失效 patch
        run: |
          cd openwrt
          rm -f target/linux/qualcommax/patches-*/9999-fix-cpr4-const-qualifier.patch 2>/dev/null || true
          echo "✅ patch 清理完成"

      - name: ⬇️ 下载软件包
        run: |
          set -euo pipefail
          cd openwrt
          echo "📥 开始下载软件包..."
          make download -j$(nproc) 2>&1 | tail -20 || make download -j1
          find dl -size -1c -exec rm -f {} \; 2>/dev/null || true
          echo "✅ 下载完成"

      - name: 🔨 编译固件
        id: compile
        shell: bash
        run: |
          set -euo pipefail
          cd openwrt
          echo "🔨 开始编译，CPU 核心数: $(nproc)"
          echo "⏰ 开始时间: $(date)"
          make -j$(nproc) V=s 2>&1 | tee build.log
          MAKE_STATUS=${PIPESTATUS[0]}
          echo "⏰ 结束时间: $(date)"
          if [ "$MAKE_STATUS" -eq 0 ]; then
            echo "status=success" >> "$GITHUB_OUTPUT"
            echo "✅ 编译成功！"
          else
            echo "status=failure" >> "$GITHUB_OUTPUT"
            echo "========== 编译错误 =========="
            grep -n " error:" build.log | grep -v "^Binary" | head -20 || true
            tail -50 build.log
            exit 1
          fi

      - name: 📦 整理固件
        if: ${{ steps.compile.outputs.status == 'success' }}
        run: |
          cd openwrt/bin/targets/*/*
          rm -rf packages
          echo "FIRMWARE_PATH=$PWD" >> $GITHUB_ENV
          ls -lh

      - name: 📤 上传固件
        if: ${{ steps.compile.outputs.status == 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt-360V6-${{ github.run_number }}
          path: |
            ${{ env.FIRMWARE_PATH }}/*.ubi
            ${{ env.FIRMWARE_PATH }}/*.itb
            ${{ env.FIRMWARE_PATH }}/*.bin
            ${{ env.FIRMWARE_PATH }}/*.manifest
          retention-days: 7
          if-no-files-found: warn

      - name: 🚀 发布 Release
        if: ${{ steps.compile.outputs.status == 'success' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "OpenWrt 360 V6 — Build ${{ github.run_number }} (${{ env.BUILD_DATE }})"
          files: |
            ${{ env.FIRMWARE_PATH }}/*.ubi
            ${{ env.FIRMWARE_PATH }}/*.itb
            ${{ env.FIRMWARE_PATH }}/*.bin
            ${{ env.FIRMWARE_PATH }}/*.manifest
          body: |
            ## 📦 OpenWrt for 360 V6
            - **分支**: `${{ env.REPO_BRANCH }}`
            - **Commit**: `${{ env.OPENWRT_COMMIT }}`
            - **构建**: `${{ github.run_number }}`
            - **日期**: `${{ env.BUILD_DATE }}`
            - **默认 IP**: `192.168.2.1`
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📋 上传编译日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: openwrt/build.log
          retention-days: 3
          if-no-files-found: ignore
