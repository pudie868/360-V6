name: Build OpenWrt for 360 V6
on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - '.github/workflows/openwrt-builder.yml'
env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: main
  TZ: Asia/Shanghai
  ARGON_TAG: "v2.3.1"
jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    permissions:
      contents: write
    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v4

      - name: 🗑️ 释放磁盘空间
        run: |
          set -euo pipefail
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/local/share/boost /usr/share/swift /usr/local/.ghcup /usr/lib/jvm
          sudo docker system prune -af --volumes 2>/dev/null || true
          sudo apt-get autoremove -y --purge && sudo apt-get clean
          sudo swapoff -a && sudo rm -f /swapfile /mnt/swapfile
          df -h
          # 使用 xargs 避免 $ 转义问题
          FREE_GB=$(df -BG / | tail -1 | xargs | cut -d' ' -f4 | tr -d 'G')
          echo "📊 当前可用空间: ${FREE_GB}GB"
          if [ "$FREE_GB" -lt 40 ]; then
            echo "❌ 剩余磁盘空间不足 40GB，编译可能失败"
            exit 1
          fi

      - name: 🛠️ 安装编译依赖
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses5-dev libssl-dev python3 python3-pip rsync \
            swig unzip zlib1g-dev wget curl ca-certificates file golang-go \
            libelf-dev libncurses-dev zstd pkg-config ccache libzstd-dev
          sudo timedatectl set-timezone "$TZ"
          # 配置 Git
          git config --global init.defaultBranch main
          git config --global pull.rebase false
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git config --global url."https://".insteadOf "git://"
          # 启用 ccache
          mkdir -p /opt/ccache
          ccache -M 10G
          ccache -z

      - name: 📥 克隆 OpenWrt 源码
        run: |
          set -euo pipefail
          git clone --depth 1 -b $REPO_BRANCH $REPO_URL openwrt
          cd openwrt
          echo "OPENWRT_COMMIT=$(git rev-parse HEAD)" >> $GITHUB_ENV
          echo "BUILD_DATE=$(date '+%Y-%m-%d')" >> $GITHUB_ENV
          echo "📋 OpenWrt 信息:"
          echo " - 分支: $REPO_BRANCH"
          echo " - Commit: ${OPENWRT_COMMIT}"

      - name: 📦 安装第三方插件
        run: |
          set -euo pipefail
          cd openwrt
          # 下载函数（带重试和校验）
          gh_download() {
            local url="\$1"
            local dest="\$2"
            local max_retries=3
            local retry=0
            local tmp
            local success=false
            while [ $retry -lt $max_retries ] && [ "$success" = false ]; do
              tmp=$(mktemp /tmp/pkg_XXXXXX.tar.gz)
              echo "📥 下载 (尝试 $((retry+1))/$max_retries): $url"
              if curl -fSL --retry 3 --retry-delay 10 --connect-timeout 60 \
                -H "User-Agent: GitHubActions/OpenWrtBuilder" \
                -o "$tmp" "$url" 2>/dev/null; then
                if [ -s "$tmp" ] && gzip -t "$tmp" 2>/dev/null; then
                  mkdir -p "$dest"
                  tar -xzf "$tmp" -C "$dest" --strip-components=1
                  rm -f "$tmp"
                  success=true
                  echo "✅ 安装完成: $dest"
                else
                  echo "❌ 文件校验失败: $url"
                  rm -f "$tmp"
                  retry=$((retry+1))
                  [ $retry -lt $max_retries ] && sleep 5
                fi
              else
                echo "❌ 下载失败: $url"
                rm -f "$tmp"
                retry=$((retry+1))
                [ $retry -lt $max_retries ] && sleep 10
              fi
            done
            [ "$success" = false ] && return 1
          }
          # ── luci-theme-argon ────────────────────────────────────
          rm -rf package/lean/luci-theme-argon 2>/dev/null || true
          gh_download \
            "https://github.com/jerrykuku/luci-theme-argon/archive/refs/tags/${ARGON_TAG}.tar.gz" \
            "package/luci-theme-argon"
          # ── homeproxy ───────────────────────────────────────────
          echo "📥 克隆 homeproxy..."
          if [ -d "package/homeproxy" ]; then
            echo "⚠️ homeproxy 已存在，跳过"
          else
            git clone --depth 1 --branch master --single-branch \
              https://github.com/immortalwrt/homeproxy.git \
              package/homeproxy \
              || git clone --depth 1 \
              https://github.com/immortalwrt/homeproxy.git \
              package/homeproxy \
              || { echo "❌ homeproxy 克隆失败"; exit 1; }
          fi
          echo "✅ homeproxy 安装完成"
          # ── luci-app-lucky ─────────────────────────
          echo "📥 克隆 luci-app-lucky..."
          if [ -d "package/luci-app-lucky" ]; then
            echo "⚠️ luci-app-lucky 已存在，跳过"
          else
            git clone --depth 1 \
              https://github.com/gdy666/luci-app-lucky.git \
              package/luci-app-lucky \
              || { echo "❌ luci-app-lucky 克隆失败"; exit 1; }
          fi
          echo "✅ luci-app-lucky 安装完成"
          # ── luci-app-filebrowser ────────────────────────────────
          echo "📥 克隆 luci-app-filebrowser..."
          if [ -d "package/luci-app-filebrowser" ]; then
            echo "⚠️ luci-app-filebrowser 已存在，跳过"
          else
            git clone --depth 1 \
              https://github.com/xiaorouji/openwrt-filebrowser.git \
              package/luci-app-filebrowser \
              || echo "⚠️ filebrowser 克隆失败，跳过"
          fi
          echo "✅ luci-app-filebrowser 安装完成"
          # ── kiddin9 插件包 ───────
          echo "📥 克隆 kiddin9 插件集..."
          if [ -d "package/kiddin9-packages" ]; then
            echo "⚠️ kiddin9-packages 已存在，跳过"
          else
            if ! git clone --depth 1 \
              https://github.com/kiddin9/openwrt-packages.git \
              package/kiddin9-packages; then
              echo "⚠️ kiddin9 克隆失败，将跳过部分插件"
            else
              echo "✅ kiddin9 插件集安装完成"
            fi
          fi

      - name: 🔄 更新 Feeds
        run: |
          set -euo pipefail
          cd openwrt
          if [ -f "feeds.conf.default" ]; then
            grep -v "kiddin9" feeds.conf.default > feeds.conf.default.tmp || true
            mv feeds.conf.default.tmp feeds.conf.default
          fi
          if ! grep -q "src-link" feeds.conf.default 2>/dev/null; then
            echo "# OpenWrt base feeds" >> feeds.conf.default
          fi
          echo "📋 当前 feeds.conf.default:"
          cat feeds.conf.default 2>/dev/null || echo "(空)"
          # 更新 feeds
          n=0
          max_retries=3
          until [ "$n" -ge $max_retries ]; do
            echo "📥 Feeds 更新 (尝试 $((n+1))/$max_retries)..."
            if ./scripts/feeds update -a 2>&1; then
              echo "✅ Feeds 更新成功"
              break
            fi
            n=$((n+1))
            if [ "$n" -lt $max_retries ]; then
              wait_time=$((n * 15 + 10))
              echo "⚠️ Feeds 更新失败，${wait_time}秒后重试..."
              sleep $wait_time
            fi
          done
          [ "$n" -ge $max_retries ] && echo "⚠️ Feeds 更新失败，但继续..."
          echo "📥 安装 Feeds..."
          ./scripts/feeds install -a || echo "⚠️ 部分 feeds 安装可能失败"

      - name: 📁 同步自定义配置文件
        run: |
          cd openwrt
          if [ -d "../files" ]; then
            echo "📦 同步 files/ 目录..."
            cp -rf ../files .
            mkdir -p files/etc/uci-defaults/ files/etc/sysctl.d/
            [ -d "files/etc/uci-defaults" ] && chmod +x files/etc/uci-defaults/*.sh 2>/dev/null || true
            [ -d "files/etc/sysctl.d" ] && chmod 644 files/etc/sysctl.d/*.conf 2>/dev/null || true
            echo "✅ 自定义配置已就绪"
          else
            echo "⚠️ 未找到 files/ 目录，跳过配置注入"
          fi

      - name: ⚙️ 生成 .config
        run: |
          set -euo pipefail
          cd openwrt
          {
            echo "CONFIG_TARGET_qualcommax=y"
            echo "CONFIG_TARGET_qualcommax_ipq60xx=y"
            echo "CONFIG_TARGET_qualcommax_ipq60xx_DEVICE_qihoo_360v6=y"
            echo "CONFIG_TARGET_ROOTFS_PARTSIZE=200"
            echo "CONFIG_TARGET_ROOTFS_SQUASHFS=y"
            echo "CONFIG_CCACHE=y"
            echo "CONFIG_SSTRIP=y"
            echo "CONFIG_TARGET_KERNEL_PARTSIZE=32"
            echo "CONFIG_KERNEL_PERF_EVENTS=y"
            echo "CONFIG_PACKAGE_kmod-cpufreq-dt=y"
            echo "CONFIG_PACKAGE_kmod-cpufreq-dt-platdev=y"
            echo "CONFIG_PACKAGE_cpufreq-utils=y"
            echo "CONFIG_PACKAGE_luci=y"
            echo "CONFIG_PACKAGE_luci-base=y"
            echo "CONFIG_PACKAGE_luci-compat=y"
            echo "CONFIG_PACKAGE_luci-lib-ipkg=y"
            echo "CONFIG_PACKAGE_luci-ssl=y"
            echo "CONFIG_PACKAGE_luci-theme-bootstrap=y"
            echo "CONFIG_PACKAGE_luci-theme-argon=y"
            echo "CONFIG_LUCI_LANG_zh-cn=y"
            echo "CONFIG_LUCI_LANG_zh_Hans=y"
            echo "CONFIG_PACKAGE_luci-i18n-base-zh-cn=y"
            echo "CONFIG_PACKAGE_luci-i18n-firewall-zh-cn=y"
            echo "CONFIG_PACKAGE_luci-i18n-opkg-zh-cn=y"
            echo "CONFIG_PACKAGE_dnsmasq-full=y"
            echo "# CONFIG_PACKAGE_dnsmasq is not set"
            echo "CONFIG_PACKAGE_firewall4=y"
            echo "CONFIG_PACKAGE_nftables=y"
            echo "CONFIG_PACKAGE_kmod-nft-offload=y"
            echo "CONFIG_PACKAGE_kmod-nft-nat=y"
            echo "# CONFIG_PACKAGE_kmod-ipt-nat6 is not set"
            echo "# CONFIG_PACKAGE_kmod-ipt-nat is not set"
            echo "# CONFIG_PACKAGE_iptables is not set"
            echo "CONFIG_PACKAGE_opkg=y"
            echo "CONFIG_PACKAGE_kmod-ath11k=y"
            echo "CONFIG_PACKAGE_kmod-ath11k-ahb=y"
            echo "CONFIG_PACKAGE_ath11k-firmware-ipq6010=y"
            echo "# CONFIG_PACKAGE_kmod-ath11k-pci is not set"
            echo "# CONFIG_PACKAGE_kmod-ath10k-ct is not set"
            echo "# CONFIG_PACKAGE_ath11k-firmware-qcn9074 is not set"
            echo "CONFIG_PACKAGE_luci-app-homeproxy=y"
            echo "CONFIG_PACKAGE_luci-i18n-homeproxy-zh-cn=y"
            echo "CONFIG_PACKAGE_sing-box=y"
            echo "CONFIG_PACKAGE_luci-app-adguardhome=y"
            echo "CONFIG_PACKAGE_adguardhome=y"
            echo "CONFIG_PACKAGE_luci-i18n-adguardhome-zh-cn=y"
            echo "CONFIG_PACKAGE_luci-app-turboacc=y"
            echo "CONFIG_PACKAGE_luci-i18n-turboacc-zh-cn=y"
            echo "CONFIG_PACKAGE_kmod-fast-classifier=y"
            echo "CONFIG_PACKAGE_kmod-shortcut-fe=y"
            echo "CONFIG_PACKAGE_kmod-shortcut-fe-drv=y"
            echo "CONFIG_PACKAGE_luci-app-lucky=y"
            echo "CONFIG_PACKAGE_lucky=y"
            echo "CONFIG_PACKAGE_luci-app-filebrowser=y"
            echo "CONFIG_PACKAGE_filebrowser=y"
            echo "CONFIG_PACKAGE_docker=y"
            echo "CONFIG_PACKAGE_dockerd=y"
            echo "CONFIG_PACKAGE_luci-app-docker=y"
            echo "CONFIG_PACKAGE_luci-app-dockerman=y"
            echo "CONFIG_PACKAGE_luci-i18n-dockerman-zh-cn=y"
            echo "CONFIG_PACKAGE_kmod-veth=y"
            echo "CONFIG_PACKAGE_kmod-br-netfilter=y"
            echo "CONFIG_PACKAGE_kmod-nft-bridge=y"
            echo "CONFIG_PACKAGE_kmod-ipt-extra=y"
            echo "CONFIG_PACKAGE_kmod-ipt-physdev=y"
            echo "CONFIG_PACKAGE_kmod-lib-crc32c=y"
            echo "CONFIG_PACKAGE_kmod-crypto-crc32c=y"
            echo "CONFIG_PACKAGE_kmod-dm=y"
            echo "CONFIG_PACKAGE_kmod-overlay=y"
            echo "CONFIG_PACKAGE_kmod-tcp-bbr=y"
            echo "CONFIG_PACKAGE_kmod-zram=y"
            echo "CONFIG_PACKAGE_zram-swap=y"
            echo "CONFIG_PACKAGE_luci-app-ttyd=y"
            echo "CONFIG_PACKAGE_luci-i18n-ttyd-zh-cn=y"
            echo "CONFIG_PACKAGE_kmod-usb-storage=y"
            echo "CONFIG_PACKAGE_kmod-usb-storage-uas=y"
            echo "CONFIG_PACKAGE_kmod-usb3=y"
            echo "CONFIG_PACKAGE_kmod-fs-ext4=y"
            echo "CONFIG_PACKAGE_kmod-fs-exfat=y"
            echo "CONFIG_PACKAGE_kmod-fs-vfat=y"
            echo "CONFIG_PACKAGE_kmod-fs-ntfs3=y"
            echo "CONFIG_PACKAGE_block-mount=y"
            echo "CONFIG_PACKAGE_kmod-fuse=y"
            echo "CONFIG_PACKAGE_e2fsprogs=y"
            echo "CONFIG_PACKAGE_fdisk=y"
            echo "CONFIG_PACKAGE_bash=y"
            echo "CONFIG_PACKAGE_htop=y"
            echo "CONFIG_PACKAGE_curl=y"
            echo "CONFIG_PACKAGE_wget-ssl=y"
            echo "CONFIG_PACKAGE_file=y"
            echo "CONFIG_PACKAGE_lsblk=y"
            echo "# CONFIG_PACKAGE_luci-app-dnsfilter is not set"
            echo "# CONFIG_PACKAGE_luci-app-openclash is not set"
            echo "# CONFIG_PACKAGE_luci-app-mosdns is not set"
            echo "# CONFIG_PACKAGE_smartdns is not set"
            echo "# CONFIG_PACKAGE_luci-app-samba4 is not set"
            echo "# CONFIG_PACKAGE_xray-core is not set"
            echo "# CONFIG_PACKAGE_hysteria is not set"
            echo "# CONFIG_PACKAGE_naiveproxy is not set"
            echo "# CONFIG_PACKAGE_tuic-client is not set"
            echo "# CONFIG_PACKAGE_netdata is not set"
            echo "# CONFIG_PACKAGE_vnstat2 is not set"
          } > .config
          make defconfig
          # 验证设备配置
          if ! grep -q "CONFIG_TARGET_qualcommax_ipq60xx_DEVICE_qihoo_360v6=y" .config; then
            echo "CONFIG_TARGET_qualcommax=y" >> .config
            echo "CONFIG_TARGET_qualcommax_ipq60xx=y" >> .config
            echo "CONFIG_TARGET_qualcommax_ipq60xx_DEVICE_qihoo_360v6=y" >> .config
          fi
          echo "✅ .config 生成完成"

      - name: 🩹 清理失效的内核 patch
        run: |
          cd openwrt
          rm -f target/linux/qualcommax/patches-*/9999-fix-cpr4-const-qualifier.patch 2>/dev/null || true
          echo "✅ 旧 patch 清理完成"

      - name: ⬇️ 下载编译所需软件包
        run: |
          set -euo pipefail
          cd openwrt
          echo "📥 开始下载软件包..."
          make download -j$(nproc) 2>&1 | tail -20 || make download -j1
          find dl -size -1c -exec rm -f {} \; 2>/dev/null || true
          find dl -size 0 -exec rm -f {} \; 2>/dev/null || true
          echo "✅ 下载完成"

      - name: 🔨 编译固件
        id: compile
        shell: bash
        run: |
          set -euo pipefail
          cd openwrt
          echo "🔨 开始编译，CPU 核心数: $(nproc)"
          echo "⏰ 开始时间: $(date)"
          make -j$(nproc) V=s 2>&1 | tee build.log
          MAKE_STATUS=${PIPESTATUS[0]}
          echo "⏰ 结束时间: $(date)"
          if [ "$MAKE_STATUS" -eq 0 ]; then
            echo "status=success" >> "$GITHUB_OUTPUT"
            echo "✅ 编译成功！"
          else
            echo "status=failure" >> "$GITHUB_OUTPUT"
            echo "========== 编译错误 =========="
            grep -n " error:" build.log | grep -v "^Binary" | head -20 || true
            tail -50 build.log
            exit 1
          fi

      - name: 📦 整理固件文件
        if: ${{ steps.compile.outputs.status == 'success' }}
        run: |
          cd openwrt/bin/targets/*/*
          rm -rf packages
          echo "FIRMWARE_PATH=$PWD" >> $GITHUB_ENV
          ls -lh

      - name: 📤 上传固件到 Artifacts
        if: ${{ steps.compile.outputs.status == 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt-360V6-${{ github.run_number }}
          path: |
            ${{ env.FIRMWARE_PATH }}/*.ubi
            ${{ env.FIRMWARE_PATH }}/*.itb
            ${{ env.FIRMWARE_PATH }}/*.bin
            ${{ env.FIRMWARE_PATH }}/*.manifest
          retention-days: 7
          if-no-files-found: warn

      - name: 🚀 发布到 Release
        if: ${{ steps.compile.outputs.status == 'success' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "OpenWrt 360 V6 — Build ${{ github.run_number }} (${{ env.BUILD_DATE }})"
          files: |
            ${{ env.FIRMWARE_PATH }}/*.ubi
            ${{ env.FIRMWARE_PATH }}/*.itb
            ${{ env.FIRMWARE_PATH }}/*.bin
            ${{ env.FIRMWARE_PATH }}/*.manifest
          body: |
            ## 📦 OpenWrt for 360 V6
            - **分支**: `${{ env.REPO_BRANCH }}`
            - **Commit**: `${{ env.OPENWRT_COMMIT }}`
            - **构建**: `${{ github.run_number }}`
            - **日期**: `${{ env.BUILD_DATE }}`
            - **默认 IP**: `192.168.2.1`
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📋 上传编译日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: openwrt/build.log
          retention-days: 3
          if-no-files-found: ignore
