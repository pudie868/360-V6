name: Build OpenWrt 360V6 Ultimate
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Toolchain
        uses: actions/cache@v4
        with:
          path: |
            openwrt/staging_dir
            openwrt/build_dir
            openwrt/tmp
          key: ${{ runner.os }}-toolchain-v1

      - name: Init Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev zlib1g-dev

      - name: Clone Source
        run: |
          git clone --depth 1 -b openwrt-23.05 https://github.com/openwrt/openwrt.git openwrt
          cd openwrt
          # 防重复追加 Feed
          grep -q "immortalwrt" feeds.conf.default || echo "src-git immortalwrt https://github.com/immortalwrt/packages.git;openwrt-23.05" >> feeds.conf.default
          grep -q "kiddin9" feeds.conf.default || echo "src-git kiddin9 https://github.com/kiddin9/openwrt-packages.git" >> feeds.conf.default

      - name: Generate Config
        run: |
          cd openwrt
          # 使用 echo 生成配置文件，确保无缩进问题
          echo "CONFIG_TARGET_qualcommax=y" > .config
          echo "CONFIG_TARGET_qualcommax_ipq60xx=y" >> .config
          echo "CONFIG_TARGET_qualcommax_ipq60xx_DEVICE_qihoo_360v6=y" >> .config
          echo "CONFIG_TARGET_ROOTFS_PARTSIZE=512" >> .config
          # 核心配置：显式禁用 dnsmasq，解决冲突
          echo "CONFIG_PACKAGE_dnsmasq=n" >> .config
          echo "CONFIG_PACKAGE_dnsmasq-full=y" >> .config
          # NSS 硬件加速
          echo "CONFIG_PACKAGE_kmod-qca-nss-drv=y" >> .config
          # 代理/容器/性能
          echo "CONFIG_PACKAGE_sing-box=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-homeproxy=y" >> .config
          echo "CONFIG_PACKAGE_dockerd=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-dockerman=y" >> .config
          echo "CONFIG_PACKAGE_kmod-tcp-bbr=y" >> .config
          echo "CONFIG_PACKAGE_zram-swap=y" >> .config
          # 界面
          echo "CONFIG_PACKAGE_luci-theme-argon=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-base-zh-cn=y" >> .config
          
          make defconfig

      - name: Install Feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Download & Compile
        run: |
          cd openwrt
          make download -j$(nproc)
          make -j$(nproc) V=s || make -j1 V=s

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: 360v6-firmware
          path: openwrt/bin/targets/*/*/*.bin
