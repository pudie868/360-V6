# BBR + TCP tuning for 360 V6 (OpenWrt router / NAT device)

net.core.default_qdisc=fq
net.ipv4.tcp_congestion_control=bbr

# Reduce idle penalty — important for interactive traffic on a router
net.ipv4.tcp_slow_start_after_idle=0

# FIX #11: tcp_tw_reuse=1 is UNSAFE on NAT devices (routers).
# Value 1 enables reuse globally and can cause connection collisions when
# masquerading. Value 2 (loopback-only, safe since Linux 4.6) is the correct
# choice here. If your kernel is older than 4.6, remove this line entirely.
net.ipv4.tcp_tw_reuse=2

# Increase SYN backlog for handling more simultaneous connection attempts
net.ipv4.tcp_max_syn_backlog=8192

# Optional: large-memory devices only — 360V6 has limited RAM, keep commented
# net.ipv4.tcp_rmem = 4096 87380 8388608
# net.ipv4.tcp_wmem = 4096 65536 8388608
